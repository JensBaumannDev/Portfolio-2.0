<section class="hero">
  <div class="content-container hero-inner">
    <div class="hero-intro">
      <h1 class="hero-title">{{ 'hero.title' | translate }}</h1>
      <p class="hero-status">{{ 'hero.status' | translate }}</p>
    </div>

    <div class="hero-scene">
      <img ngSrc="/img/hero/lighthouse.svg" width="120" height="260" class="hero-lighthouse" aria-hidden="true" priority alt="Pilsumer Leuchtturm" />

      <div class="hero-avatar">
        <div class="hero-portrait">
          <img ngSrc="/img/hero/profile.png" width="800" height="800" priority [alt]="'hero.profile_alt' | translate" class="hero-portrait-img" />
        </div>
        <p class="hero-greeting">{{ 'hero.greeting' | translate }}</p>

        <div class="hero-socials">
          <a href="https://github.com/JensBaumannDev" target="_blank" rel="noopener" class="button hero-social-link" aria-label="GitHub">
            <ng-icon name="lucideGithub" class="icon-github"></ng-icon>
          </a>
          <a href="https://www.linkedin.com/in/jens-baumann-7a6866315/" target="_blank" rel="noopener" class="button hero-social-link" aria-label="LinkedIn">
            <ng-icon name="lucideLinkedin" class="icon-linkedin"></ng-icon>
          </a>
          <a href="https://www.youtube.com/@jensbaumann_music" target="_blank" rel="noopener" class="button hero-social-link" aria-label="YouTube">
            <ng-icon name="lucideYoutube" class="icon-youtube"></ng-icon>
          </a>
        </div>
      </div>
    </div>

    <div class="hero-actions">
      <a href="#projects" class="button">
        {{ 'hero.cta_projects' | translate }}
        <span aria-hidden="true">&rarr;</span>
      </a>
      <a href="#contact" class="button button-outline">{{ 'hero.cta_contact' | translate }}</a>
      <a routerLink="/cv" class="button button-outline">{{ 'hero.cta_cv' | translate }}</a>
    </div>
  </div>
</section>
