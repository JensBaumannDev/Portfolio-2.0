<header class="navbar" [class.menu-open]="isMenuOpen()" [class.scrolled]="isScrolled()">
  <div class="navbar-content content-container">
    <a href="#" class="brand" (click)="closeMenu(); setActiveSection('home')">
      <span class="brand-mark" aria-hidden="true">JB</span>
      <span class="brand-name">Jens Baumann</span>
    </a>

    <nav class="nav-links">
      <a href="#home" class="nav-link" [class.active]="currentActiveSection() === 'home'" (click)="setActiveSection('home')">{{ 'nav.home' | translate }}</a>
      <a href="#projects" class="nav-link" [class.active]="currentActiveSection() === 'projects'" (click)="setActiveSection('projects')">{{ 'nav.projects' | translate }}</a>
      <a href="#about" class="nav-link" [class.active]="currentActiveSection() === 'about'" (click)="setActiveSection('about')">{{ 'nav.about' | translate }}</a>
      <a href="#contact" class="nav-link" [class.active]="currentActiveSection() === 'contact'" (click)="setActiveSection('contact')">{{ 'nav.contact' | translate }}</a>
    </nav>

    <div class="nav-actions">
      <button
        class="theme-toggle"
        type="button"
        (click)="toggleTheme()"
        [attr.aria-label]="'nav.theme' | translate"
      >
        @if (themeMode() === 'light') {
          <ng-icon name="lucideSun" size="18px"></ng-icon>
        } @else if (themeMode() === 'dark') {
          <ng-icon name="lucideMoon" size="18px"></ng-icon>
        } @else {
          <ng-icon name="lucideMonitor" size="18px"></ng-icon>
        }
      </button>

      <div class="lang-selector">
        <button class="lang-btn" [class.active]="currentLang() === 'de'" (click)="changeLanguage('de')" aria-label="Deutsch">DE</button>
        <span class="lang-separator" aria-hidden="true">/</span>
        <button class="lang-btn" [class.active]="currentLang() === 'en'" (click)="changeLanguage('en')" aria-label="English">EN</button>
      </div>

      <button class="burger-btn" [class.active]="isMenuOpen()" (click)="toggleMenu()" [attr.aria-expanded]="isMenuOpen()" aria-label="Menü umschalten">
        <span class="burger-line"></span>
        <span class="burger-line"></span>
        <span class="burger-line"></span>
      </button>
    </div>
  </div>

  <div class="mobile-menu" [class.open]="isMenuOpen()">
    <nav class="mobile-nav-links">
      <a href="#home" class="mobile-nav-link" [class.active]="currentActiveSection() === 'home'" (click)="setActiveSection('home'); closeMenu()">{{ 'nav.home' | translate }}</a>
      <a href="#projects" class="mobile-nav-link" [class.active]="currentActiveSection() === 'projects'" (click)="setActiveSection('projects'); closeMenu()">{{ 'nav.projects' | translate }}</a>
      <a href="#about" class="mobile-nav-link" [class.active]="currentActiveSection() === 'about'" (click)="setActiveSection('about'); closeMenu()">{{ 'nav.about' | translate }}</a>
      <a href="#contact" class="mobile-nav-link" [class.active]="currentActiveSection() === 'contact'" (click)="setActiveSection('contact'); closeMenu()">{{ 'nav.contact' | translate }}</a>

      <div class="mobile-lang-selector">
        <button class="mobile-lang-btn" [class.active]="currentLang() === 'de'" (click)="changeLanguage('de')" aria-label="Deutsch">DE</button>
        <span class="mobile-lang-separator" aria-hidden="true">/</span>
        <button class="mobile-lang-btn" [class.active]="currentLang() === 'en'" (click)="changeLanguage('en')" aria-label="English">EN</button>
      </div>
    </nav>
  </div>
</header>
