<div class="content-container skills-inner">
  <article class="panel-card" appReveal>
    <p class="card-eyebrow">{{ 'skills.eyebrow' | translate }}</p>
    <h2 class="card-title">{{ 'skills.title' | translate }}</h2>

    <ul class="stack-pills" appRevealStagger revealSelector=".stack-pill">
      @for (skill of skills; track skill) {
        <li class="stack-pill">{{ skill }}</li>
      }
    </ul>
  </article>
</div>
